<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="./style.css">
  <title>Frontend Mentor | Product preview card component</title>

</head>
<body>
    <main>
        <div class="main">
            <div class="img-container">
                <picture>
                    <!-- Desktop image -->
                    <source media="(min-width: 651px)" srcset="./images/image-product-desktop.jpg">

                    <!-- Mobile image -->
                    <source media="(max-width: 650px)" srcset="./images/image-product-mobile.jpg">

                    <img src="./images/image-product-desktop.jpg" alt="Gabrielle Essence Eau De Parfum">
                </picture>
            </div>
            <div class="container">
                <p class="cetagory">PERFUME</p>
                <h1>Gabrielle Essence Eau<br> De Parfum</h1>
                <p class="discription">A floral, solar and voluptuous interpretation composed by Olivier Polge,
                Perfumer-Creator for the House of CHANEL.</p>
                    <div class="price-box">
                        <span class="current-price">$149.99</span>
                        <span class="old-price">$169.99</span>
                    </div>
                    <button type="button" class="btn"><img src="./images/icon-cart.svg" alt="cart-icon" class="icon">Add to Cart</button>
            </div>
        </div>
    </main>
</body>
</html>
